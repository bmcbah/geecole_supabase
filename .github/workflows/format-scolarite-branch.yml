name: Format schooling branch

on:
  push:
    branches:
      - fix/academic-session-request-loop

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/academic-session-request-loop
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format changed code only
        run: |
          git diff --name-only origin/main...HEAD -- \
            '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css' '*.yml' '*.yaml' \
            | grep -v '^docs/' \
            | xargs -r npx prettier --write

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No formatting changes"
          else
            git commit -m "style: formater les fichiers de code de la PR"
            git push origin HEAD:fix/academic-session-request-loop
          fi
