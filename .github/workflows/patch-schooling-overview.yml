name: Patch schooling overview

on:
  push:
    branches:
      - feat/scolarite-overview-professional

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/scolarite-overview-professional
      - name: Patch overview integration
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('src/modules/schooling/services/schooling-overview.service.ts')
          content = service.read_text()
          content = content.replace('.in("status", ["draft", "pending", "pre_registered"])', '.in("status", ["draft", "pre_registered"])')
          content = content.replace('      pending: "Dossier soumis au contrôle",\n', '')
          service.write_text(content)

          navigation = Path('src/app/navigation.ts')
          content = navigation.read_text()
          marker = '''    items: [\n      {\n        type: "link",\n        label: "Élèves",'''
          replacement = '''    items: [\n      {\n        type: "link",\n        label: "Vue d’ensemble",\n        icon: "pi-chart-bar",\n        to: "/scolarite",\n      },\n      {\n        type: "link",\n        label: "Élèves",'''
          if marker not in content:
            raise SystemExit('Navigation marker not found')
          navigation.write_text(content.replace(marker, replacement, 1))

          router = Path('src/app/router/AppRouter.tsx')
          content = router.read_text()
          import_marker = '''const StudentsPage = lazy(() =>\n  import("../../modules/schooling/pages/StudentsPage").then((module) => ({\n    default: module.StudentsPage,\n  })),\n);'''
          import_replacement = '''const SchoolingOverviewPage = lazy(() =>\n  import("../../modules/schooling/pages/SchoolingOverviewPage").then((module) => ({\n    default: module.SchoolingOverviewPage,\n  })),\n);\nconst StudentsPage = lazy(() =>\n  import("../../modules/schooling/pages/StudentsPage").then((module) => ({\n    default: module.StudentsPage,\n  })),\n);'''
          if import_marker not in content:
            raise SystemExit('Router import marker not found')
          content = content.replace(import_marker, import_replacement, 1)
          route_marker = '            <Route path="/scolarite/eleves" element={<StudentsPage />} />'
          route_replacement = '''            <Route path="/scolarite" element={<SchoolingOverviewPage />} />\n            <Route path="/scolarite/eleves" element={<StudentsPage />} />'''
          if route_marker not in content:
            raise SystemExit('Router route marker not found')
          router.write_text(content.replace(route_marker, route_replacement, 1))

          Path('.github/workflows/patch-schooling-overview.yml').unlink()
          PY
      - name: Commit overview integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src .github/workflows/patch-schooling-overview.yml
          git commit -m "feat(scolarite): raccorder la vue d’ensemble professionnelle"
          git push origin HEAD:feat/scolarite-overview-professional
