name: Final features migration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/migrate-features-to-modules.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Move remaining feature files
        shell: bash
        run: |
          set -euo pipefail
          if [ -d src/features ]; then
            mkdir -p src/modules
            cp -rn src/features/. src/modules/
          fi

          find src -type f \( -name '*.ts' -o -name '*.tsx' \) -print0 \
            | xargs -0 sed -i 's#/features/#/modules/#g'

          rm -rf src/features
          rm -f .github/workflows/migrate-features-to-modules.yml

          if grep -R --line-number --include='*.ts' --include='*.tsx' '/features/' src; then
            echo 'Des imports features subsistent.' >&2
            exit 1
          fi

      - name: Validate frontend
        run: |
          npm ci
          npm run build

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: remove legacy features folder'
          git push origin HEAD:main
