name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Collect Prettier differences
        run: npm exec prettier -- --list-different . > prettier-files.txt || true
      - name: Upload Prettier differences
        uses: actions/upload-artifact@v4
        with:
          name: prettier-files
          path: prettier-files.txt
      - name: Check Prettier differences
        run: test ! -s prettier-files.txt
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key-with-minimum-length
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: supabase db start
      - run: supabase test db
