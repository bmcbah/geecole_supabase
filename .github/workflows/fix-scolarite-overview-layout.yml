name: Fix schooling overview layout

on:
  workflow_dispatch:
  push:
    branches:
      - feat/scolarite-overview-professional
    paths:
      - .github/workflows/fix-scolarite-overview-layout.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/scolarite-overview-professional
      - name: Apply targeted layout fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/modules/schooling/pages/SchoolingOverviewPage.tsx')
          source = path.read_text()
          source = source.replace(
              'className="flex items-start justify-between gap-3"',
              'className="flex min-w-0 items-start justify-between gap-3"',
          )
          source = source.replace(
              'className="min-w-0 text-xs font-semibold uppercase tracking-[0.08em] text-slate-500"',
              'className="block min-w-0 flex-1 truncate text-xs font-semibold uppercase tracking-[0.08em] text-slate-500"\n          title={item.label}',
          )
          source = source.replace(
              'className="mt-auto pt-3 text-xs leading-5 text-slate-500"',
              'className="mt-auto block w-full min-w-0 truncate pt-3 text-xs leading-5 text-slate-500"\n        title={item.description}',
          )
          source = source.replace(
              'className="space-y-5"',
              'className="w-full min-w-0 space-y-5"',
          )
          source = source.replace(
              '<section aria-labelledby="schooling-kpis-title">',
              '<section className="w-full min-w-0" aria-labelledby="schooling-kpis-title">',
          )
          source = source.replace(
              'className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-6"',
              'className="grid w-full min-w-0 grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-6"',
          )
          source = source.replace(
              'className="grid grid-cols-1 gap-4 xl:grid-cols-2"',
              'className="grid w-full min-w-0 grid-cols-1 gap-4 xl:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]"',
          )
          source = source.replace(
              'className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"',
              'className="min-w-0 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"',
          )
          path.write_text(source)
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/fix-scolarite-overview-layout.yml
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/modules/schooling/pages/SchoolingOverviewPage.tsx .github/workflows/fix-scolarite-overview-layout.yml
          git commit -m "fix(scolarite): contraindre les KPI et étendre les blocs du dashboard"
          git push origin HEAD:feat/scolarite-overview-professional
